<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>G→N Icon Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Google Sans Text', system-ui, sans-serif;
    gap: 48px;
  }
  .row { display: flex; align-items: flex-end; gap: 32px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { color: #444; font-size: 11px; letter-spacing: 1px; }
  h2 { color: #333; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
</style>
</head>
<body>
<h2>G→N Icon — Google Sans Text</h2>
<div class="row">

  <!-- 
    Design:
    - Smaller content in container (generous padding)
    - More space between G, →, N (tspans with explicit x positions)
    - Google Sans Text Bold
    - rx=56 for slightly rounder corners
  -->

  <div class="item">
    <svg width="32" height="32" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="256" height="256" rx="56" fill="#0F4BFF"/>
      <text font-family="'Google Sans Text', 'Google Sans', system-ui, sans-serif" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">
        <tspan x="72"  y="128" font-size="80">G</tspan>
        <tspan x="128" y="118" font-size="68">→</tspan>
        <tspan x="186" y="128" font-size="80">N</tspan>
      </text>
    </svg>
    <div class="label">32</div>
  </div>

  <div class="item">
    <svg width="64" height="64" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
