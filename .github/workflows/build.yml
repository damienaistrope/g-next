name: Build and Upload Artifacts

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Run desktop build (generate dmg)'
        required: false
        default: 'false'
      commit_artifacts:
        description: 'Commit built artifacts back to repo (use with caution)'
        required: false
        default: 'false'
      commit_message:
        description: 'Commit message when committing artifacts'
        required: false
        default: 'Build artifacts from CI'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build project
        run: |
          DESKTOP_INPUT="${{ github.event.inputs.desktop || 'false' }}"
          if [ "$DESKTOP_INPUT" = "true" ]; then
            npm run build:desktop
          else
            npm run build
          fi

      - name: Upload `dist` artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload DMG/artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            *.dmg
            public/*.dmg
            public/*.command

      - name: Commit built artifacts back to repo (optional)
        if: ${{ github.event.inputs.commit_artifacts == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${{ github.event.inputs.commit_message }}" || echo "No changes to commit"
          git push origin HEAD:main
